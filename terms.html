<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terms of Use — M House</title>
<meta name="description" content="M House, a boutique social destination in Larnaka old town. Terms of use — page coming soon.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --w:#F5F3EE; --g1:#EDEAE0; --g2:#D8D2C8; --be:#C4A882;
  --ta:#8C7B6B; --dk:#3D3530; --ol:#7A8C5E; --olp:#D4DCCA;
  --fd:"Cormorant Garamond",Georgia,serif;
  --fb:"Jost",system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{background:var(--w);color:var(--dk);font-family:var(--fb);font-weight:300;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:2rem;-webkit-font-smoothing:antialiased}
.eyebrow{font-size:.75rem;letter-spacing:.35em;text-transform:uppercase;color:var(--ta);margin-bottom:1.5rem}
h1{font-family:var(--fd);font-weight:300;font-size:clamp(2.5rem,7vw,4.5rem);line-height:1.05;margin-bottom:1rem}
p{color:var(--ta);max-width:34ch;line-height:1.75;margin-bottom:2.5rem}
a.back{display:inline-block;font-size:.8rem;letter-spacing:.15em;text-transform:uppercase;
  color:var(--dk);border:1px solid var(--dk);border-radius:50px;padding:.85rem 2.25rem;
  transition:background .3s,color .3s}
a.back:hover{background:var(--ol);border-color:var(--ol);color:var(--w)}
</style>
</head>
<body>
  <p class="eyebrow">M House · Larnaka</p>
  <h1>Terms of Use</h1>
  <p>This page is coming soon.</p>
  <a class="back" href="index.html">Back to home</a>
</body>
</html>
